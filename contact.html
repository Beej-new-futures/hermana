<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Hermana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ede9e3;
      font-family: 'DM Sans', sans-serif;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .nav-left {
      position: fixed;
      top: 0; left: 0;
      z-index: 200;
      padding: 28px 40px;
    }

    .nav-right {
      position: fixed;
      top: 0; right: 0;
      z-index: 200;
      padding: 28px 40px;
    }

    .nav-left a, .nav-right a {
      color: #000;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .nav-left a:hover, .nav-right a:hover { color: #ff5500; }

    @media (max-width: 768px) {
      .nav-left, .nav-right { padding: 20px 20px; }
      .nav-left a, .nav-right a { font-size: 11px; }
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(80px, 12vw, 140px) clamp(24px, 8vw, 120px);
    }

    .contact-block {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: clamp(40px, 8vw, 140px);
      width: 100%;
      max-width: 900px;
    }

    .contact-block .item {
      text-align: center;
    }

    .contact-block .item-label {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(18px, 2.4vw, 30px);
      font-weight: 700;
      color: #000;
      display: block;
      margin-bottom: 0.2em;
    }

    .contact-block .item-value {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(18px, 2.4vw, 30px);
      font-weight: 300;
      font-style: italic;
      color: #000;
      text-decoration: none;
      display: block;
      transition: color 0.25s ease;
    }

    .contact-block a.item-value:hover { color: #ff5500; }

    @media (max-width: 600px) {
      .contact-block {
        flex-direction: column;
        align-items: center;
        gap: 2em;
      }
    }
  </style>
</head>
<body>

  <div class="nav-left"><a href="manifesto.html">Manifesto</a></div>
  <div class="nav-right"><a href="index.html">Home</a></div>

  <div class="content">
    <div class="contact-block">

      <span class="item">
        <span class="item-label">Phone</span>
        <a href="tel:07811188103" class="item-value">07811 188 103</a>
      </span>

      <span class="item">
        <span class="item-label">Email</span>
        <a href="mailto:info@hermana.uk" class="item-value">info@hermana.uk</a>
      </span>

    </div>
  </div>

</body>
</html>
