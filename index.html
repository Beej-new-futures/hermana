<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ede9e3;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    .nav-left {
      position: fixed;
      top: 0; left: 0;
      z-index: 1000;
      padding: 28px 40px;
      mix-blend-mode: exclusion;
    }

    .nav-right {
      position: fixed;
      top: 0; right: 0;
      z-index: 1000;
      padding: 28px 40px;
      mix-blend-mode: exclusion;
    }

    .nav-left a, .nav-right a {
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .nav-left a:hover, .nav-right a:hover { color: #ff5500; }

    @media (max-width: 768px) {
      .nav-left, .nav-right { padding: 20px 20px; }
      .nav-left a, .nav-right a { font-size: 11px; }
      .arrow-top { display: none !important; }
    }

    .hero {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: none;
      mix-blend-mode: exclusion;
    }

    .hero img {
      width: clamp(300px, 60vw, 900px);
      height: auto;
      display: block;
    }

    .mobile-grid { display: none; }

    @media (max-width: 768px) {
      .mobile-grid {
        display: block;
        padding: 100px 16px 80px;
      }

      .mobile-grid .m-img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
        display: block;
        margin-bottom: 16px;
      }

      .frame { display: none !important; }
      #scroll-body { display: none !important; }
    }

    .arrow-top {
      position: fixed;
      bottom: clamp(40px, 6vh, 80px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 998;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .arrow-top.visible {
      opacity: 1;
      pointer-events: auto;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .arrow-top svg {
      width: clamp(32px, 3vw, 48px);
      height: auto;
      display: block;
    }

    .frame {
      position: fixed;
      overflow: hidden;
      will-change: transform;
    }

    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .frame .caption {
      position: absolute;
      bottom: 14px; left: 18px;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="nav-left"><a href="contact.html">Contact</a></div>
  <div class="nav-right"><a href="manifesto.html">Manifesto</a></div>

  <div class="hero">
    <img src="logo.png" alt="Hermana" />
  </div>

  <div id="scroll-body"></div>

  <!-- Mobile grid — same image order as desktop -->
  <div class="mobile-grid">
    <img class="m-img" src="image9.jpg"  alt="" />
    <img class="m-img" src="image1.jpg"  alt="" />
    <img class="m-img" src="image5.jpg"  alt="" />
    <img class="m-img" src="image16.jpg" alt="" />
    <img class="m-img" src="image3.jpg"  alt="" />
    <img class="m-img" src="image2.jpg"  alt="" />
    <img class="m-img" src="image7.jpg"  alt="" />
    <img class="m-img" src="image4.jpg"  alt="" />
    <img class="m-img" src="image10.jpg" alt="" />
    <img class="m-img" src="image6.jpg"  alt="" />
    <img class="m-img" src="image15.jpg" alt="" />
    <img class="m-img" src="image17.jpg" alt="" />
  </div>

  <div class="arrow-top" id="arrow-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="40" x2="24" y2="8" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="10,22 24,8 38,22" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <script>
  (() => {
    const MOBILE_BP = 768;

    // ── LAYOUT MODEL ──────────────────────────────────────────────
    // Each image is given a focusS (the scroll position, in screen-
    // heights, where it lands centre-screen) and a targetT (its
    // vertical resting position at that moment, 0 = top, 1 = bottom).
    // focusS values are spaced evenly, so images arrive at a steady
    // cadence — every ~0.78 screens of scroll, one image hits centre.
    // restY is derived from these so the maths always lines up, no
    // matter the speed. SIZE drives SPEED: bigger = slower drift,
    // smaller = faster. Tweak SPACING for a longer/shorter scroll.
    const SPACING = 0.78;   // screens of scroll between each image's focus
    const TAIL    = 1.2;    // breathing room after the last image

    const raw = [
      // src,        n,  wFrac, aspect, speed, align,   offset, targetT
      ['image9.jpg',  1, 0.78, 4/5,   0.45, 'center',  0,   0.45], // XL hero — unchanged
      ['image1.jpg',  2, 0.60, 16/10, 0.62, 'right',   60,  0.35], // L
      ['image5.jpg',  3, 0.44, 4/5,   0.80, 'left',    80,  0.52], // M
      ['image16.jpg', 4, 0.24, 3/4,   1.12, 'right',   110, 0.28], // XS
      ['image3.jpg',  5, 0.30, 3/4,   0.98, 'left',    90,  0.46], // S
      ['image2.jpg',  6, 0.60, 16/10, 0.62, 'center',  0,   0.38], // L
      ['image7.jpg',  7, 0.44, 4/5,   0.80, 'right',   70,  0.52], // M
      ['image4.jpg',  8, 0.30, 3/4,   0.98, 'left',    90,  0.30], // S
      ['image10.jpg', 9, 0.60, 16/10, 0.62, 'right',   40,  0.48], // L
      ['image6.jpg', 10, 0.24, 3/4,   1.12, 'center',  0,   0.34], // XS
      ['image15.jpg',11, 0.44, 16/10, 0.80, 'left',    70,  0.52], // M
      ['image17.jpg',12, 0.70, 4/5,   0.45, 'right',   60,  0.40], // XL — calm close
    ];

    const defs = raw.map((r, i) => {
      const [src, n, wFrac, aspect, speed, align, offset, targetT] = r;
      const focusS = i * SPACING;
      return {
        id: i, src, n, wFrac, aspect, speed, align, offset,
        // restY so that at scroll = focusS, the image sits at targetT:
        restY: targetT + focusS * speed,
        focusS,
      };
    });

    const lastFocus = (defs.length - 1) * SPACING;

    const mobileDefs = defs.map((def, i) => ({
      ...def,
      wFrac: 0.88,
      aspect: 4/3,
      align: 'center',
      offset: 0,
      speed: 0.04 + i * 0.02,
      restY: 0.9 + i * 0.80,
    }));

    const bySpeed = [...defs].sort((a, b) => a.speed - b.speed);
    const elMap = {};

    bySpeed.forEach((def, i) => {
      const frame = document.createElement('div');
      frame.className = 'frame';
      frame.style.zIndex = i + 1;

      const img = document.createElement('img');
      img.src = def.src;
      img.alt = '';

      const cap = document.createElement('span');
      cap.className = 'caption';
      cap.textContent = String(def.n).padStart(2, '0');

      frame.appendChild(img);
      frame.appendChild(cap);
      document.body.appendChild(frame);
      elMap[def.id] = frame;
    });

    function isMobile() { return window.innerWidth < MOBILE_BP; }

    function render() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scrollY = window.scrollY;
      const mobile = isMobile();
      const activeDefs = mobile ? mobileDefs : defs;

      activeDefs.forEach(def => {
        const el = elMap[def.id];
        const w = Math.min(def.wFrac * vw, vw - 32);
        const h = w / def.aspect;
        el.style.width  = w + 'px';
        el.style.height = h + 'px';

        let left;
        if (mobile) {
          left = (vw - w) / 2;
        } else if (def.align === 'center') {
          left = (vw - w) / 2 + def.offset;
        } else if (def.align === 'left') {
          left = def.offset;
        } else {
          left = vw - w - def.offset;
        }
        el.style.left = left + 'px';

        const centreY = def.restY * vh - scrollY * def.speed;
        el.style.top = (centreY - h / 2) + 'px';
      });
    }

    function setScrollHeight() {
      const vh = window.innerHeight;
      const mobile = isMobile();
      let totalScreens;
      if (mobile) {
        const maxRestY = Math.max(...mobileDefs.map(d => d.restY));
        totalScreens = maxRestY + 1.5;
      } else {
        // Just enough to bring the last image to focus, plus a short tail
        totalScreens = lastFocus + TAIL;
      }
      document.getElementById('scroll-body').style.height = (totalScreens * vh) + 'px';
    }

    const arrowEl = document.getElementById('arrow-top');

    function updateArrow() {
      const scrollY = window.scrollY;
      const totalH = document.getElementById('scroll-body').offsetHeight;
      if (scrollY > totalH * 0.80) {
        arrowEl.classList.add('visible');
      } else {
        arrowEl.classList.remove('visible');
      }
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { render(); updateArrow(); ticking = false; });
        ticking = true;
      }
    }, { passive: true });

    window.addEventListener('resize', () => { setScrollHeight(); render(); });

    setScrollHeight();
    render();
  })();
  </script>

</body>
</html>
